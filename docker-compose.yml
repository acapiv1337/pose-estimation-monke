services:
  backend:
    build: ./backend
    container_name: fastapi-backend
    env_file: .env
    ports:
      - "8001:8001"
  frontend:
    build:
      context: ./frontend
      args:
        VITE_PORTFOLIO_PASSWORD: ${VITE_PORTFOLIO_PASSWORD:-monke2024}
    container_name: vue-frontend
    env_file: .env
    ports:
      - "5173:80"
    depends_on:
      - backend
